name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo check --workspace

  test-features:
    name: Test with Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test --workspace --features cpal-backend,websocket --lib
      - run: cargo check --workspace --no-default-features

  bench-fuzz:
    name: Bench & Fuzz Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check benchmarks compile
        run: cargo bench --no-run --workspace
      - name: Check fuzz targets compile
        run: cd fuzz && cargo check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo check --workspace

  platform:
    name: Platform Check (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo check --workspace
      - run: cargo test --workspace --lib
      - name: Test cpal-backend on macOS/Windows
        if: runner.os != 'Linux'
        run: cargo test -p coppa-audio --lib --features cpal-backend

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit
