name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo check --workspace

  test-features:
    name: Test with Features (fast, lib-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test --workspace --features cpal-backend,websocket --lib
      - run: cargo check --workspace --no-default-features

  test-full:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test --workspace --features cpal-backend,websocket

  bench-fuzz:
    name: Bench & Fuzz Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check benchmarks compile
        run: cargo bench --no-run --workspace
      - name: Check fuzz targets compile
        run: cd fuzz && cargo check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo check --workspace

  platform:
    name: Platform Check (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo check --workspace
      - run: cargo test --workspace --lib
      - name: Test cpal-backend on macOS/Windows
        if: runner.os != 'Linux'
        run: cargo test -p coppa-audio --lib --features cpal-backend

  deny:
    name: Supply-chain check (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  wiki-lint:
    name: Wiki lint
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Clone sunto
        env:
          SUNTO_TOKEN: ${{ secrets.SUNTO_RO_TOKEN }}
        run: git clone "https://x-access-token:${SUNTO_TOKEN}@github.com/HagaleTechnologies/sunto.git" /tmp/sunto
      - name: Lint wiki
        run: python3 /tmp/sunto/bin/wiki-lint wiki/

  # Summary gate for branch protection. bench-fuzz and platform are excluded:
  # bench-fuzz is compile-only (slow, no test signal) and platform is a matrix
  # job that duplicates linux coverage already in test-full/test-features.
  ci:
    name: CI
    needs: [check, test-features, test-full, clippy, fmt, msrv, deny, audit, wiki-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All CI checks passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -q '"failure"\|"cancelled"'; then
            echo "One or more required CI jobs failed"
            exit 1
          fi
          echo "All required CI jobs passed"
